<section class="page">
    <header class="page-header">
        <h1>Reports</h1>
        <p>Generate and review accounting statements by date or date range.</p>
    </header>
    <div class="stack">
        <div class="card stack">
            <h2>Report Generator</h2>
            <div class="grid">
                <div class="field">
                    <label for="report_type">Report Type</label>
                    <select id="report_type" data-report-type>
                        <option value="trial_balance">Trial Balance</option>
                        <option value="income_statement">Income Statement</option>
                        <option value="balance_sheet">Balance Sheet</option>
                        <option value="retained_earnings">Retained Earnings</option>
                    </select>
                </div>
                <div class="field" data-as-of-field>
                    <label for="report_as_of">As Of</label>
                    <input id="report_as_of" type="date" data-report-as-of />
                </div>
                <div class="field" data-from-field>
                    <label for="report_from_date">From Date</label>
                    <input id="report_from_date" type="date" data-report-from-date />
                </div>
                <div class="field" data-to-field>
                    <label for="report_to_date">To Date</label>
                    <input id="report_to_date" type="date" data-report-to-date />
                </div>
            </div>
            <div class="stack" style="flex-direction: row; gap: 0.75rem; flex-wrap: wrap">
                <button type="button" data-generate-report>Generate</button>
                <button type="button" data-export-csv>Save CSV</button>
                <button type="button" data-email-report>Email</button>
                <button type="button" data-print-report>Print</button>
            </div>
        </div>

        <div class="card stack" data-report-summary-card>
            <h2 data-report-title>Report Summary</h2>
            <p class="meta" data-report-period-label>Select report options and click Generate.</p>
            <div class="notice" data-report-highlight>No report generated yet.</div>
        </div>

        <div class="card stack">
            <h2>Report Output</h2>
            <div class="table-scroll" data-report-output></div>
        </div>
    </div>
</section>
